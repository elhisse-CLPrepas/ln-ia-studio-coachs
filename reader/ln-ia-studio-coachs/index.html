<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Lecteur Web LN-IA Livre Factory pour consulter la présentation LN-IA Studio Coachs page par page."
    >
    <meta name="theme-color" content="#101820">
    <title>LN-IA Studio Coachs - Lecteur Web</title>
    <link rel="icon" type="image/png" href="../../assets/img/logo-ln-ia.png">
    <style>
      :root {
        color: #172027;
        background: #f7f7f4;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: #f7f7f4;
      }

      a {
        color: inherit;
      }

      a:focus-visible,
      button:focus-visible {
        outline: 3px solid #f2c86b;
        outline-offset: 3px;
      }

      .reader-shell {
        min-height: 100vh;
      }

      .reader-header {
        position: sticky;
        top: 0;
        z-index: 5;
        color: #fff;
        background: rgba(16, 24, 32, 0.97);
        border-bottom: 1px solid rgba(242, 200, 107, 0.4);
      }

      .reader-header-inner {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 18px;
        align-items: center;
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 12px 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        text-decoration: none;
      }

      .brand img {
        width: 160px;
        height: 52px;
        object-fit: contain;
        padding: 6px 10px;
        background: #fff;
      }

      .brand span {
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .reader-title {
        min-width: 0;
      }

      .reader-title h1 {
        margin: 0 0 4px;
        color: #f2c86b;
        font-size: clamp(1.1rem, 2.4vw, 1.7rem);
        line-height: 1.12;
      }

      .reader-title p {
        margin: 0;
        color: #f8f3ea;
        font-size: 0.94rem;
      }

      .reader-actions {
        display: flex;
        gap: 8px;
      }

      .reader-actions a,
      .reader-actions button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        color: #14201c;
        background: #a9dfbf;
        border: 0;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      .reader-layout {
        display: grid;
        grid-template-columns: 176px minmax(0, 1fr);
        gap: 24px;
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 56px;
      }

      .thumbs {
        position: sticky;
        top: 96px;
        align-self: start;
        display: grid;
        gap: 10px;
        max-height: calc(100vh - 120px);
        overflow: auto;
        padding-right: 6px;
      }

      .thumbs a {
        display: grid;
        gap: 6px;
        padding: 8px;
        color: #172027;
        background: #fff;
        border: 1px solid #d8d5ce;
        text-decoration: none;
      }

      .thumbs img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        background: #101820;
      }

      .thumbs span {
        font-size: 0.78rem;
        font-weight: 800;
      }

      .pages {
        display: grid;
        gap: 28px;
      }

      .page-card {
        margin: 0;
        padding: 12px;
        background: #fff;
        border: 1px solid #d8d5ce;
      }

      .page-card img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: contain;
        background: #101820;
      }

      .page-card figcaption {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 2px 0;
        color: #47515a;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .reader-footer {
        padding: 28px 14px;
        color: #f8f3ea;
        background: #101820;
        text-align: center;
      }

      .reader-footer p {
        margin: 0;
      }

      @media (max-width: 820px) {
        .reader-header-inner {
          grid-template-columns: 1fr;
        }

        .brand img {
          width: 180px;
          height: 58px;
        }

        .reader-actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .reader-layout {
          grid-template-columns: 1fr;
          gap: 18px;
          padding-top: 18px;
        }

        .thumbs {
          position: static;
          grid-template-columns: repeat(4, minmax(0, 1fr));
          max-height: none;
          overflow: visible;
          padding-right: 0;
        }

        .thumbs span {
          text-align: center;
        }

        .page-card {
          padding: 8px;
        }
      }

      @media (max-width: 520px) {
        .reader-actions,
        .thumbs {
          grid-template-columns: 1fr 1fr;
        }

        .brand span {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="reader-shell">
      <header class="reader-header">
        <div class="reader-header-inner">
          <a class="brand" href="#page-1" aria-label="Retour à la première page">
            <img src="../../assets/img/logo-ln-ia.png" alt="LN-IA" width="160" height="52">
            <span>LAB-NUMERIQUE-IA</span>
          </a>
          <div class="reader-title">
            <h1>LN-IA Studio Coachs - Lecteur Web</h1>
            <p>Présentation visuelle convertie depuis PDF, page par page.</p>
          </div>
          <div class="reader-actions">
            <a href="sources/ln-ia-studio-coachs-lab-numerique-V1.pdf">PDF</a>
            <button type="button" data-toggle-fit>Ajuster</button>
          </div>
        </div>
      </header>

      <main class="reader-layout">
        <nav class="thumbs" aria-label="Navigation des pages" data-thumbs></nav>
        <section class="pages" aria-label="Pages de la présentation" data-pages></section>
      </main>

      <footer class="reader-footer">
        <p>LN-IA Livre Factory - Apprendre en produisant. Produire pour transmettre.</p>
      </footer>
    </div>

    <script>
      const pageCount = 22;
      const thumbs = document.querySelector("[data-thumbs]");
      const pages = document.querySelector("[data-pages]");
      const fitButton = document.querySelector("[data-toggle-fit]");

      for (let index = 1; index <= pageCount; index += 1) {
        const number = String(index).padStart(3, "0");
        const imagePath = `images/page_${number}.jpg`;

        const thumbLink = document.createElement("a");
        thumbLink.href = `#page-${index}`;
        thumbLink.innerHTML = `
          <img src="${imagePath}" alt="" loading="lazy">
          <span>Page ${index}</span>
        `;
        thumbs.append(thumbLink);

        const figure = document.createElement("figure");
        figure.className = "page-card";
        figure.id = `page-${index}`;
        figure.innerHTML = `
          <img src="${imagePath}" alt="Page ${index} de la présentation LN-IA Studio Coachs" loading="${index === 1 ? "eager" : "lazy"}">
          <figcaption>
            <span>Page ${index}</span>
            <span>${index} / ${pageCount}</span>
          </figcaption>
        `;
        pages.append(figure);
      }

      fitButton.addEventListener("click", () => {
        document.body.classList.toggle("compact-reader");
        document.querySelectorAll(".page-card").forEach((page) => {
          page.style.maxWidth = document.body.classList.contains("compact-reader") ? "900px" : "";
          page.style.marginInline = document.body.classList.contains("compact-reader") ? "auto" : "";
        });
      });
    </script>
  </body>
</html>
